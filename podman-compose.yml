services:
  django:
    image: ghcr.io/aeshemi1/portfolio:latest
    container_name: portfolio-docker
    ports:
      - "9000:8000"
    expose:
      - "9000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: ${DEBUG}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
    volumes:
      - static_files:/app/staticfiles
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    ports:
      - "9001:80" # HTTP
      - "9002:443" # HTTPS
    volumes:
      - static_files:/srv/staticfiles:ro
      - ${NGINX_CONF_LOCATION:-./nginx/nginx.conf}:/etc/nginx/nginx.conf
      - ${CERTS_DIR:-./certs}:/etc/ssl/certs:ro
    depends_on:
      - django
    restart: unless-stopped
    
volumes:
  static_files: