user nginx nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    log_format advanced_logging '$remote_addr - [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';
    error_log /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log advanced_logging;

    upstream django {
        server django:8000;
    }

    # Cache configuration for CSS and JS files
    map $uri $cache_control_headers {
        default "public, max-age=604800, s-maxage=2419200";
    }

    # Check if the static file is hashed
    map $request_uri $static_filename_is_hashed {
        "~^/static/.*\.([0-9a-fA-F]{12})\.([a-zA-Z0-9]+)$"    1; 
        default                                             0;
    }

    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2 default_server;
        server_name www.emilspace.com emilspace.com;

        ssl_certificate /etc/ssl/certs/server.crt;
        ssl_certificate_key /etc/ssl/certs/server.key;
        ssl_trusted_certificate /etc/ssl/certs/ca.crt;

        location /static/ {
            alias /srv/staticfiles/;
            include /etc/nginx/mime.types;

            if ($static_filename_is_hashed = 1){
                add_header Cache-Control $cache_control_headers;
                expires 1y;
            }

            if ($static_filename_is_hashed = 0) {
                return 404;
            }

        }

        location / {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}