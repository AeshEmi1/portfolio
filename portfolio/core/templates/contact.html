{% extends 'base.html' %}

{% block content %}
<div class="max-w-6xl mx-auto px-6 py-20">
    <div class="text-center mb-16">
        <h1 class="text-5xl md:text-6xl font-extrabold mb-8 text-brand-accent tracking-tighter">
            Let's connect.
        </h1>
        <p class="text-xl text-slate-400 max-w-2xl mx-auto font-medium">
            Available for consulting, FTE, and contract engineering roles.
        </p>
    </div>

    <div class="grid md:grid-cols-2 gap-8 items-stretch">

        <a href="mailto:{{ email }}" class="group p-10 glass rounded-3xl border border-white/5 hover:border-brand-accent/50 transition-all duration-300">
            <div class="flex items-center gap-8">
                <div class="w-16 h-16 bg-brand-accent/10 rounded-2xl flex items-center justify-center text-brand-accent group-hover:scale-110 transition-transform">
                    <i class="fas fa-envelope fa-xl"></i>
                </div>
                <div>
                    <p class="text-sm uppercase tracking-widest text-slate-500 font-bold mb-2">Email Me</p>
                    <p class="text-2xl font-bold text-white tracking-tight">{{ email }}</p>
                </div>
            </div>
        </a>

        <a href="{{ linkedin }}" target="_blank" class="group p-10 glass rounded-3xl border border-white/5 hover:border-brand-accent/50 transition-all duration-300">
            <div class="flex items-center gap-8">
                <div class="w-16 h-16 bg-brand-accent/10 rounded-2xl flex items-center justify-center text-brand-accent group-hover:scale-110 transition-transform">
                    <i class="fab fa-linkedin fa-xl"></i>
                </div>
                <div>
                    <p class="text-sm uppercase tracking-widest text-slate-500 font-bold mb-2">Network</p>
                    <p class="text-2xl font-bold text-white tracking-tight">Emiliano Garcia</p>
                </div>
            </div>
        </a>

    </div>
</div>
{% endblock %}
